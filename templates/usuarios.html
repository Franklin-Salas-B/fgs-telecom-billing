<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - FGS Telecom</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #0056b3; /* Azul Telecom */
            --secondary-color: #6c757d;
            --bg-color: #f4f7f6;
            --sidebar-color: #1a202c;
            --text-dark: #2d3748;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            color: var(--text-dark);
        }

        /* Sidebar Navigation */
        nav {
            width: 250px;
            height: 100vh;
            background-color: var(--sidebar-color);
            color: white;
            position: fixed;
            padding: 20px 0;
        }

        nav h2 {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #4fd1c5;
        }

        nav a {
            display: block;
            padding: 15px 25px;
            color: #cbd5e0;
            text-decoration: none;
            transition: 0.3s;
            border-left: 4px solid transparent;
        }

        nav a:hover, nav a.active {
            background-color: #2d3748;
            color: white;
            border-left: 4px solid var(--primary-color);
        }

        nav i { margin-right: 10px; }

        /* Main Content Area */
        .main-content {
            margin-left: 250px;
            padding: 40px;
            width: 100%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 { margin: 0; font-weight: 600; }

        /* Table Styling */
        .card {
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 20px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            text-align: left;
            background-color: #f8fafc;
            color: var(--secondary-color);
            padding: 15px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #edf2f7;
        }

        tr:hover { background-color: #f9fafb; }

        /* Badges for Roles */
        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-admin { background-color: #ebf8ff; color: #3182ce; }

        /* Actions Button */
        .btn-add {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<nav>
    <h2>FGS TELECOM</h2>
    <a href="/"><i class="fas fa-home"></i> Inicio</a>
    <a href="/usuarios" class="active"><i class="fas fa-users"></i> Usuarios</a>
    <a href="/productos"><i class="fas fa-box"></i> Productos</a>
    <a href="/factura"><i class="fas fa-file-invoice-dollar"></i> Facturación</a>
</nav>

<div class="main-content">
    <header>
        <div>
            <h1>Gestión de Usuarios</h1>
            <p style="color: var(--secondary-color);">Administra los accesos y roles de tu personal.</p>
        </div>
        <a href="#" class="btn-add"><i class="fas fa-plus"></i> Nuevo Usuario</a>
    </header>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre de Usuario</th>
                    <th>Rol de Acceso</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>#001</td>
                    <td><strong>Dueño</strong></td>
                    <td><span class="badge badge-admin">Administrador</span></td>
                    <td><i class="fas fa-circle" style="color: #48bb78; font-size: 10px;"></i> Activo</td>
                    <td><i class="fas fa-edit" style="color: var(--secondary-color); cursor:pointer;"></i></td>
                </tr>
                <tr>
                    <td>#002</td>
                    <td><strong>Gerente</strong></td>
                    <td><span class="badge badge-admin">Administrador</span></td>
                    <td><i class="fas fa-circle" style="color: #48bb78; font-size: 10px;"></i> Activo</td>
                    <td><i class="fas fa-edit" style="color: var(--secondary-color); cursor:pointer;"></i></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
